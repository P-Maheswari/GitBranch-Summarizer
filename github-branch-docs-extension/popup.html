<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Branch Docs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shell">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
          <path d="M9 18c-4.51 2-5-2-7-2"/>
        </svg>
        Branch Docs
      </div>
      <button class="options-btn" id="optionsBtn" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
        </svg>
      </button>
    </header>

    <!-- Repo info card -->
    <div class="repo-card" id="repoCard">
      <div class="repo-card__icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div class="repo-card__info">
        <span class="repo-card__name" id="repoName">Detecting repo…</span>
        <span class="repo-card__sub" id="repoSub">Navigate to a GitHub repository</span>
      </div>
      <div class="repo-card__badge" id="branchBadge" style="display:none">
        <span id="branchCount">0</span> branches
      </div>
    </div>

    <!-- Inline key inputs -->
    <div class="key-section">
      <div class="field">
        <label class="field__label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Groq API Key
        </label>
        <div class="field__row">
          <input type="password" id="groqKey" class="field__input" placeholder="gsk_…" autocomplete="off" />
          <button class="field__eye" id="toggleGroq" tabindex="-1" aria-label="Toggle visibility">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eyeGroq"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label class="field__label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
          GitHub PAT <span class="field__optional">(optional)</span>
        </label>
        <div class="field__row">
          <input type="password" id="githubPat" class="field__input" placeholder="ghp_… (avoids rate limits)" autocomplete="off" />
          <button class="field__eye" id="togglePat" tabindex="-1" aria-label="Toggle visibility">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eyePat"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="model-row">
        <label class="field__label" for="modelSelect">Groq Model</label>
        <select class="model-select" id="modelSelect">
          <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
          <option value="llama-3.1-70b-versatile">Llama 3.1 70B (High Quality)</option>
          <option value="mixtral-8x7b-32768">Mixtral 8×7B</option>
          <option value="gemma2-9b-it">Gemma 2 – 9B</option>
        </select>
      </div>
    </div>

    <!-- Progress area -->
    <div class="progress-area" id="progressArea" style="display:none">
      <div class="progress-header">
        <span class="progress-label" id="progressLabel">Initialising…</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-log" id="progressLog"></div>
    </div>

    <!-- Error banner -->
    <div class="error-banner" id="errorBanner" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorText"></span>
    </div>

    <!-- CTA -->
    <button class="cta" id="startBtn" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="ctaIcon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span id="ctaText">Start Documentation</span>
    </button>

    <div class="footer-hint" id="footerHint">Keys are saved locally to Chrome storage.</div>

  </div>

  <!-- JSZip from CDN -->
  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
